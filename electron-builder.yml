# Packaging for the desktop shell. Build with:  npm run pack:mac
# (scripts/pack-mac.mjs: builds the static UI, the speech helper, and the
# camera addon, stages whisper, then runs electron-builder). Signing is
# env-driven through that script (CSC_NAME + CAPTURIA_TEAM_ID); with no env it
# explicitly falls back to the unsigned/ad-hoc pack so CI and contributor
# machines keep working. No identity string or team id is ever committed to
# this public file.

# Bundle id decision: the app keeps com.capturia.desktop (what the loopback
# runtime, keychain entries, and macOS permission grants are already keyed
# on). The embedded CMIO extension keeps its own id,
# com.capturia.camera.extension, unchanged from the dev host app so an
# extension already activated on a dev machine keeps matching.
#
# In-app activation (M8 slice 2): the packaged app can activate its own
# embedded extension when it is signed with the restricted
# com.apple.developer.system-extension.install entitlement AND embeds a
# provisioning profile for com.capturia.desktop that authorizes it (AMFI
# SIGKILLs the app otherwise, Developer ID included). Both ride the
# CAPTURIA_PROVISIONING_PROFILE env through scripts/pack-mac.mjs, which
# GENERATES the entitlements file (base plist + entitlement + Xcode-style
# identity claims) and passes -c.mac.provisioningProfile / -c.mac.entitlements
# on the CLI; nothing identity-like lives here, and the committed default
# entitlements deliberately omit the entitlement so profile-less signed packs
# keep launching. See docs/virtual-camera.md for the profile workflows.
appId: com.capturia.desktop
productName: Capturia

directories:
  output: dist-app
  buildResources: build

# App files beyond package.json + production node_modules (which
# electron-builder includes on its own): the main process and the static UI.
#
# The negations prune production deps the packaged app never loads: the
# renderer is a self-contained static export (its React/Next/pdfjs code is
# already inside out/'s bundles), and Electron main only requires
# @copilotkit/runtime, ai + @ai-sdk/*, and nodejs-whisper. Anything removed
# here that main secretly needed would fail the packaged smoke
# (CAPTURIA_SMOKE=1 on the built binary), so keep that green when touching
# this list.
files:
  - electron/**/*
  - out/**/*
  # Dev-only spike runner; not part of the product.
  - "!electron/spike-frames.js"
  # Web-framework packages, used only to BUILD the static export.
  - "!node_modules/next/**"
  - "!node_modules/@next/**"
  - "!node_modules/react/**"
  - "!node_modules/react-dom/**"
  # Renderer-side libraries, already bundled into out/ by the export.
  - "!node_modules/@copilotkit/react-core/**"
  - "!node_modules/@copilotkit/react-ui/**"
  - "!node_modules/@copilotkit/a2ui-renderer/**"
  - "!node_modules/pdfjs-dist/**"
  - "!node_modules/pptx-text-parser/**"
  - "!node_modules/qrcode/**"
  # Not imported anywhere in main (models go through ai + @ai-sdk/*).
  - "!node_modules/@anthropic-ai/sdk/**"
  # Shipped via extraResources instead (see below), never through the asar.
  - "!node_modules/nodejs-whisper/**"

# nodejs-whisper chdirs into its own package dir and execs cwd-relative paths
# (./download-ggml-model.sh, ./build/bin/whisper-cli). That is impossible from
# an asar, even unpacked: require() resolves the module's paths through the
# archive's VIRTUAL path, and chdir into it throws ENOTDIR. So a SELF-CONTAINED
# copy (package + nested transitive deps, staged by
# scripts/stage-whisper-resources.mjs in pack:mac) ships as a real directory in
# Contents/Resources, and electron/whisper.js requires it from
# process.resourcesPath when packaged. The copy happens in the afterPack hook,
# NOT extraResources, whose default excludes silently strip the nested
# node_modules the staged copy depends on. Ship it provisioned
# (npx nodejs-whisper download before packing) or transcription surfaces its
# provisioning error at runtime; pack:mac prints a warning either way.
#
# The same hook ships the rest of the native camera stack: the capturia-speech
# helper and the capturia-frames addon into Contents/Resources (a .node cannot
# load from inside the asar; electron/camera-feed.js requires it from
# process.resourcesPath when packaged), and the CMIO camera extension into
# Contents/Library/SystemExtensions. afterPack runs BEFORE signing, so
# everything it places is sealed and (except the extension, see signIgnore)
# signed by electron-builder.
afterPack: scripts/after-pack.mjs

# capturia-frames is pure N-API (ABI-stable across Node/Electron) and ships
# via the afterPack hook, and nodejs-whisper spawns a prebuilt binary, so the
# electron-rebuild pass stays off.
npmRebuild: false

mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - target: dir
      arch: arm64
  # Identity comes from the ENVIRONMENT only (CSC_NAME, resolved against the
  # keychain by electron-builder; see scripts/pack-mac.mjs for the whole
  # contract). There is deliberately no identity key here: null would disable
  # signing even with CSC_NAME set, and a literal name cannot live in a public
  # file. Without CSC_NAME, pack-mac.mjs disables identity auto-discovery, so
  # the fallback is the same unsigned/ad-hoc app as before signing existed.
  #
  # Notarization is deliberately NOT electron-builder's (notarize stays
  # false): its built-in flow skips silently when credentials are missing,
  # runs inside every pack (slowing the dev loop), and never staples the DMG.
  # Instead scripts/notarize-mac.mjs (the tail of npm run dist:mac, gated on
  # CAPTURIA_NOTARY_PROFILE, a notarytool keychain-profile name) submits the
  # DMG, fails loudly on rejection, staples app + DMG, and re-asserts with
  # spctl. docs/release.md has the credential setup. A notarized build must
  # also ship whisper fully provisioned: a post-install download would write
  # into the bundle and break its signature.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # The system-extension host contract also wants the usage string on the
  # app's own Info.plist (the embedded extension bundle carries its own).
  extendInfo:
    NSSystemExtensionUsageDescription: >-
      Capturia installs a virtual camera so your calls can show AI-composed
      overlays.
  notarize: false
  # The embedded CMIO camera extension (placed by scripts/after-pack.mjs at
  # Contents/Library/SystemExtensions) arrives already signed by
  # native/CapturiaCamera/build-signed.sh with its own entitlements (sandbox +
  # team app group) and provisioning profile. electron-builder's per-file
  # signing walk force-signs every Mach-O it finds with the inherit
  # entitlements above, which would strip the extension's own; keep it out of
  # the walk. The outer app signature still SEALS the extension as nested
  # code, so codesign --verify --deep --strict covers it.
  signIgnore:
    - "Library/SystemExtensions"

# The release DMG. Built ONLY by npm run dist:mac (scripts/dist-mac.mjs),
# which wraps the app pack:mac already built and verified via electron-builder
# --prepackaged; the mac target above stays dir so the pack:mac dev loop never
# pays for an image. Volume name and icon fall back to productName + the app
# icon, and the default window is the standard drag-to-Applications layout
# (app left, /Applications symlink right), all deliberately left at their
# defaults so they track the app's own metadata.
dmg:
  # Never sign the image: the app inside is already sealed (re-signing is
  # exactly what the dist step must not do), notarization tickets ride the
  # stapled DMG instead, and Apple's workflow does not require a signed
  # container.
  sign: false
  # No auto-update infra exists; skip the .blockmap sidecar so dist-app holds
  # exactly the artifact that ships.
  writeUpdateInfo: false
